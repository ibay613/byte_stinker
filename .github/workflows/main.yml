name: Build Byte Stinker

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Project (x64 Release)
      run: |
        msbuild byte_stinker/byte_stinker.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Upload Compiled Binary
      uses: actions/upload-artifact@v4
      with:
        name: byte-stinker-x64-release
        path: byte_stinker/x64/Release/byte_stinker.exe
